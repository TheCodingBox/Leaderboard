<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Leaderboard</title>

  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0c0d0f;
      color: #e8eaf0;
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      margin-bottom: 20px;
    }

    #status {
      color: #888;
      margin-bottom: 20px;
    }

    #board {
      width: 100%;
      max-width: 600px;
    }

    .card {
      background: #13151a;
      border: 1px solid #1f2330;
      padding: 14px;
      margin-bottom: 10px;
      border-radius: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    button {
      cursor: pointer;
      margin-left: 6px;
    }
  </style>
</head>

<body>

<h1>Leaderboard</h1>
<div id="status">Loading...</div>
<div id="board"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<script>
/* 🔧 YOUR CONFIG */
const SUPABASE_URL = "https://rotkvofxmvbgsyclbnkx.supabase.co";
const SUPABASE_KEY = "YOUR_ANON_KEY_HERE";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const statusEl = document.getElementById("status");
const boardEl = document.getElementById("board");

let state = {};

function setStatus(msg) {
  statusEl.innerText = msg;
}

async function load() {
  try {
    setStatus("Loading items...");

    const { data: items, error: e1 } = await supabase
      .from("items")
      .select("*");

    if (e1) throw e1;

    const { data: votes, error: e2 } = await supabase
      .from("votes")
      .select("*");

    if (e2) throw e2;

    const safeItems = items || [];
    const safeVotes = votes || [];

    state = {};

    for (const i of safeItems) {
      state[i.id] = { name: i.name, up: 0, down: 0 };
    }

    for (const v of safeVotes) {
      if (!state[v.item_id]) continue;
      if (v.vote_type === "up") state[v.item_id].up++;
      if (v.vote_type === "down") state[v.item_id].down++;
    }

    render();
    setStatus("");

  } catch (err) {
    console.error(err);
    setStatus("Error: " + err.message);
  }
}

function render() {
  boardEl.innerHTML = "";

  const sorted = Object.entries(state)
    .map(([id, v]) => ({
      id,
      ...v,
      score: v.up - v.down
    }))
    .sort((a, b) => b.score - a.score);

  if (sorted.length === 0) {
    boardEl.innerHTML = "<p>No items yet</p>";
    return;
  }

  for (const item of sorted) {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div>
        <b>${item.name}</b><br>
        Score: ${item.score}
      </div>
      <div>
        <button onclick="vote('${item.id}','up')">⬆️</button>
        <button onclick="vote('${item.id}','down')">⬇️</button>
      </div>
    `;

    boardEl.appendChild(div);
  }
}

window.vote = async (id, type) => {
  await supabase.from("votes").insert({
    item_id: id,
    vote_type: type
  });

  load();
};

load();
</script>

</body>
</html>
