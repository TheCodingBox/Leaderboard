<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Leaderboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0c0d0f;
      --surface:   #13151a;
      --border:    #1f2330;
      --text:      #e8eaf0;
      --muted:     #565d7a;
      --accent:    #f0c040;
      --up:        #3dffa0;
      --down:      #ff5f6e;
      --rank1:     #f0c040;
      --rank2:     #c0c8e0;
      --rank3:     #d08850;
      --radius:    12px;
      --mono:      'DM Mono', monospace;
      --display:   'Syne', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px 80px;
    }

    header {
      text-align: center;
      margin-bottom: 48px;
    }
    header .eyebrow {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.22em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    header h1 {
      font-family: var(--display);
      font-size: clamp(2.2rem, 5vw, 3.6rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1;
      color: var(--text);
    }
    header h1 span { color: var(--accent); }
    header p.sub {
      margin-top: 12px;
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    #search {
      width:100%;
      max-width:620px;
      margin-bottom:20px;
      padding:10px 12px;
      border-radius:10px;
      border:1px solid var(--border);
      background:var(--surface);
      color:var(--text);
      font-family:var(--mono);
      font-size:13px;
      outline:none;
    }

    #config-banner {
      background: #1a1008;
      border: 1px solid #604010;
      border-radius: var(--radius);
      padding: 16px 20px;
      max-width: 620px;
      width: 100%;
      margin-bottom: 32px;
      font-size: 13px;
      line-height: 1.7;
      color: #c8a060;
      display: none;
    }

    #status {
      max-width: 620px;
      width: 100%;
      text-align: center;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 24px;
      min-height: 20px;
    }
    #status.error { color: var(--down); }

    #board {
      width: 100%;
      max-width: 620px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: grid;
      grid-template-columns: 44px 1fr auto;
      align-items: center;
      gap: 16px;
      padding: 16px 18px;
      transition: border-color 0.2s, transform 0.15s;
      animation: slideIn 0.3s ease both;
    }
    .card:hover {
      border-color: #2e3450;
      transform: translateX(3px);
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .rank {
      font-family: var(--display);
      font-size: 1.25rem;
      font-weight: 800;
      color: var(--muted);
      text-align: center;
      width: 44px;
    }
    .rank.r1 { color: var(--rank1); }
    .rank.r2 { color: var(--rank2); }
    .rank.r3 { color: var(--rank3); }

    .meta { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
    .meta .name {
      font-family: var(--display);
      font-size: 1.05rem;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .meta .score-row {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--muted);
    }
    .score-val {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 500;
      color: var(--accent);
    }
    .score-val.neg { color: var(--down); }

    .votes {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-shrink: 0;
    }

    .btn {
      display: flex;
      align-items: center;
      gap: 5px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 12px;
      cursor: pointer;
      padding: 6px 10px;
    }

  </style>
</head>
<body>

<header>
  <p class="eyebrow">HenryBox Rankings</p>
  <h1>LEADER<span>BOARD</span></h1>
  <p class="sub"><span class="live-dot"></span>Live · updates in real time</p>
</header>

<input id="search" type="text" placeholder="Search names..." />

<div id="status">Loading…</div>
<div id="board"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

const searchEl = document.getElementById('search');
let searchQuery = '';

searchEl.addEventListener('input', () => {
  searchQuery = searchEl.value.toLowerCase();
  render();

</script>

</body>
</html>
